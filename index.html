<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MVR 結算系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 移除 Chrome, Safari, Edge, Opera 的上下小按鈕 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    /* 移除 Firefox 的上下小按鈕 */
    input[type=number] {
      -moz-appearance: textfield;
    }

    body { font-family: 'Noto Sans TC', sans-serif; background: #f4f7fa; padding: 20px 12px; margin: 0; color: #2d3748; }
    .card { background: white; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(160, 174, 192, 0.15); max-width: 480px; margin: auto; }
    h2 { text-align: center; color: #1a365d; margin-top: 0; margin-bottom: 25px; font-weight: 700; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { background: #2b6cb0; color: white; padding: 10px 14px; text-align: left; font-size: 15px; border-radius: 8px 8px 0 0; }
    td { padding: 10px 6px; border-bottom: 1px solid #edf2f7; font-size: 15px; }
    .label { color: #4a5568; font-weight: 500; width: 42%; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #f7fafc; }
    button { width: 100%; padding: 15px; background: #319795; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .res-section { margin-top: 20px; padding: 18px; background: #f0fff4; border-radius: 12px; border: 2px solid #38a169; display: none; }
    .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #2f855a; }
    .res-val { font-weight: 700; color: #22543d; font-size: 19px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>MVR 結算機</h2>
    <table>
      <tr><th colspan="2">📊 上一班數據</th></tr>
      <tr><td class="label">T602液位</td><td><input type="number" id="b2"></td></tr>
      <tr><td class="label">MVR排放量</td><td><input type="number" id="b3"></td></tr>
      <tr><td class="label">自來水液位</td><td><input type="number" id="b4"></td></tr>
      <tr><th colspan="2" style="padding-top:15px;">📝 過程紀錄</th></tr>
      <tr><td class="label">第一次 補水</td><td><div style="display:flex; gap:8px;"><input type="number" id="b8" placeholder="前"><input type="number" id="c8" placeholder="後"></div></td></tr>
      <tr><td class="label">第二次 補水</td><td><div style="display:flex; gap:8px;"><input type="number" id="b9" placeholder="前"><input type="number" id="c9" placeholder="後"></div></td></tr>
      <tr><td class="label">氯化銨 第一包</td><td><input type="number" id="b11"></td></tr>
      <tr><td class="label">氯化銨 第二包</td><td><input type="number" id="b12"></td></tr>
      <tr><td class="label">氯化銨 第三包</td><td><input type="number" id="b13"></td></tr>
      <tr><td class="label">氯化銨 第四包</td><td><input type="number" id="b14"></td></tr>
      <tr><td class="label">氯化銨 第五包</td><td><input type="number" id="b15"></td></tr>
      <tr><th colspan="2" style="padding-top:15px;">📈 本班數據</th></tr>
      <tr><td class="label">T602液位</td><td><input type="number" id="b19"></td></tr>
      <tr><td class="label">MVR排放量</td><td><input type="number" id="b20"></td></tr>
      <tr><td class="label">自來水液位</td><td><input type="number" id="b21"></td></tr>
    </table>
    <button onclick="calc()">結算</button>
    <div id="resBox" class="res-section">
      <div class="res-row"><span>溶液處理量：</span><span class="res-val" id="r25">0</span></div>
      <div class="res-row"><span>氯化銨總量：</span><span class="res-val" id="r26">0</span></div>
      <div class="res-row"><span>自來水用量：</span><span class="res-val" id="r27">0</span></div>
    </div>
  </div>
  <script>
    function calc() {
      const g = (id) => parseFloat(document.getElementById(id).value) || 0;
      const b2=g('b2'), b3=g('b3'), b4=g('b4'), b8=g('b8'), c8=g('c8'), b9=g('b9'), c9=g('c9'), b11=g('b11'), b12=g('b12'), b13=g('b13'), b14=g('b14'), b15=g('b15'), b19=g('b19'), b20=g('b20'), b21=g('b21');
      document.getElementById('r25').innerText = (((b2 - b19) * 0.25) + (b20 - b3)).toFixed(2);
      document.getElementById('r26').innerText = (b11 + b12 + b13 + b14 + b15).toFixed(2);
      document.getElementById('r27').innerText = (((b4 - b8) + (c8 - b9) + (c9 - b21)) / 20).toFixed(2);
      document.getElementById('resBox').style.display = 'block';
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
  </script>
</body>
</html>
